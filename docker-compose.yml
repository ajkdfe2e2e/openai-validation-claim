services:
  vc-backend:
    build: .
    image: vc-backend:latest
    container_name: vc-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VALCLAIM_DATA_DIR=/data
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8765:8765"
    networks:
      - sub2api-network
networks:
  sub2api-network:
    external: true
    name: sub2api-deploy_sub2api-network