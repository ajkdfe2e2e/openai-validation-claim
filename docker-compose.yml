services:
  vc-backend:
    build: .
    image: vc-backend:latest
    container_name: vc-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - VALCLAIM_DATA_DIR=/data
    volumes:
      - ./data:/data
    networks:
      - vc-network
    # 不暴露任何主机端口，仅经 Cloudflare Tunnel 访问

  vc-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vc-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - vc-backend
    networks:
      - vc-network

networks:
  vc-network:
    name: vc-network